<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Introverse — My Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 450px; height: 450px; background: rgba(192, 132, 252, 0.07); top: -100px; right: -100px; animation: drift 14s ease-in-out infinite alternate; }
    .orb-2 { width: 350px; height: 350px; background: rgba(230, 57, 70, 0.05); bottom: 0; left: -80px; animation: drift 18s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(25px, 25px); } }

    /* Layout */
    .journal-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .journal-sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .sidebar-user {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-new {
      width: 100%;
      margin-top: 1rem;
      padding: 0.7rem;
      border: none;
      border-radius: 10px;
      background: var(--accent-chat);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-new:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Entries list */
    .entries-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }
    .entries-list::-webkit-scrollbar { width: 4px; }
    .entries-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .entry-item {
      padding: 1rem 1.5rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .entry-item:hover { background: rgba(255,255,255,0.025); }
    .entry-item.active { background: rgba(192,132,252,0.06); border-left-color: var(--accent-chat); }

    .entry-item-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }
    .entry-item-preview {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }
    .entry-item-date {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.3rem;
      opacity: 0.7;
    }

    /* Mood tag */
    .mood-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 0.4rem;
      flex-shrink: 0;
    }

    /* Empty sidebar */
    .entries-empty {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--muted);
    }
    .entries-empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .entries-empty p { font-size: 0.82rem; }

    /* ── Main Editor ── */
    .journal-main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Welcome screen */
    .journal-welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }
    .welcome-icon { font-size: 4rem; opacity: 0.5; }
    .welcome-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--text); opacity: 0.4; }
    .welcome-sub { font-size: 0.83rem; max-width: 280px; line-height: 1.6; }

    /* Editor */
    .editor-area {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-area.visible { display: flex; }

    .editor-topbar {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .editor-title-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      outline: none;
      min-width: 150px;
    }
    .editor-title-input::placeholder { color: var(--muted); opacity: 0.5; }

    /* Mood selector */
    .mood-select {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .mood-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .mood-btn:hover { background: rgba(255,255,255,0.06); transform: scale(1.1); }
    .mood-btn.selected { border-color: var(--accent-chat); background: rgba(192,132,252,0.12); }

    /* Actions */
    .editor-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn-save {
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: var(--accent-chat);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-delete {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-delete:hover { color: #e63946; border-color: rgba(230,57,70,0.3); }

    /* Body textarea */
    .editor-body {
      flex: 1;
      padding: 2rem;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.9;
      outline: none;
      resize: none;
      overflow-y: auto;
    }
    .editor-body::placeholder { color: var(--muted); font-style: italic; opacity: 0.5; }

    .editor-footer {
      padding: 0.6rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .editor-wordcount { font-size: 0.72rem; color: var(--muted); }
    .save-status { font-size: 0.72rem; color: var(--muted); }
    .save-status.saved { color: #4ade80; }
    .save-status.saving { color: var(--accent-chat); }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; }
    .loading-logo span { color: var(--accent-anime); }
    .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent-chat); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media(max-width: 768px) {
      .journal-layout { grid-template-columns: 1fr; height: auto; }
      .journal-sidebar { height: 320px; border-right: none; border-bottom: 1px solid var(--border); }
      .journal-main { height: calc(100vh - 64px - 320px); }
    }
    @media(max-width: 480px) {
      .editor-topbar { padding: 1rem; }
      .editor-body { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-logo">INTRO<span>VERSE</span></div>
    <div class="loading-spinner"></div>
  </div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- NAV -->
    <nav class="nav">
    <a href="index.html" class="nav-logo">INTRO<span>VERSE</span></a>
    <ul class="nav-links">
      <li><a href="anime.html" class="nav-link ">Anime</a></li>
      <li><a href="music.html" class="nav-link ">Music</a></li>
      <li><a href="chat.html" class="nav-link ">Chatbot</a></li>
      <li><a href="quotes.html" class="nav-link ">Quotes</a></li>
      <li><a href="journal.html" class="nav-link active">Journal</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <a href="login.html" id="nav-login-btn" style="display:none;font-size:0.78rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;">Login</a>
      <span id="nav-user-email" style="display:none;font-size:0.72rem;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <button id="nav-logout-btn" onclick="navLogout()" style="display:none;padding:0.35rem 0.85rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.75rem;cursor:pointer;transition:all 0.2s;">Sign out</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
    </div>
  </nav>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    const _fbc = { apiKey:"AIzaSyCyHnSYF3D1UXM3Mz5Jb_u7tgmH0vShai0", authDomain:"introverse-5a0ea.firebaseapp.com", projectId:"introverse-5a0ea", storageBucket:"introverse-5a0ea.firebasestorage.app", messagingSenderId:"840538042176", appId:"1:840538042176:web:a70901a7e81888d9b094a5" };
    const _fapp = initializeApp(_fbc);
    const _fauth = getAuth(_fapp);
    onAuthStateChanged(_fauth, (user) => {
      if (user) {
        document.getElementById("nav-user-email").style.display = "block";
        document.getElementById("nav-user-email").textContent = user.email;
        document.getElementById("nav-logout-btn").style.display = "block";
        document.getElementById("nav-login-btn").style.display = "none";
      } else {
        document.getElementById("nav-login-btn").style.display = "block";
        document.getElementById("nav-logout-btn").style.display = "none";
        document.getElementById("nav-user-email").style.display = "none";
      }
    });
    window.navLogout = async function() { await signOut(_fauth); window.location.href = "login.html"; };
  </script>

  <!-- Layout -->
  <div class="journal-layout">

    <!-- SIDEBAR -->
    <aside class="journal-sidebar">
      <div class="sidebar-top">
        <p class="sidebar-title">📓 My Journal</p>
        <p class="sidebar-user" id="sidebarUser">Loading…</p>
        <button class="btn-new" onclick="newEntry()">+ New Entry</button>
      </div>
      <div class="entries-list" id="entriesList">
        <div class="entries-empty">
          <div class="entries-empty-icon">🌙</div>
          <p>No entries yet.<br/>Start writing!</p>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="journal-main">

      <!-- Welcome -->
      <div class="journal-welcome" id="welcomeScreen">
        <div class="welcome-icon">✍️</div>
        <p class="welcome-title">Your Journal</p>
        <p class="welcome-sub">Select an entry to read, or create a new one to start writing.</p>
      </div>

      <!-- Editor -->
      <div class="editor-area" id="editorArea">
        <div class="editor-topbar">
          <input class="editor-title-input" id="entryTitle" type="text" placeholder="Entry title…" maxlength="80"/>
          <div class="mood-select" id="moodSelect"></div>
          <div class="editor-actions">
            <button class="btn-save" id="saveBtn" onclick="saveEntry()">Save</button>
            <button class="btn-delete" id="deleteBtn" onclick="deleteEntry()">Delete</button>
          </div>
        </div>
        <textarea class="editor-body" id="entryBody" placeholder="Write your thoughts here… This is your safe space 🌙"></textarea>
        <div class="editor-footer">
          <span class="editor-wordcount" id="wordCount">0 words</span>
          <span class="save-status" id="saveStatus">Unsaved</span>
        </div>
      </div>

    </main>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCyHnSYF3D1UXM3Mz5Jb_u7tgmH0vShai0",
      authDomain: "introverse-5a0ea.firebaseapp.com",
      projectId: "introverse-5a0ea",
      storageBucket: "introverse-5a0ea.firebasestorage.app",
      messagingSenderId: "840538042176",
      appId: "1:840538042176:web:a70901a7e81888d9b094a5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Moods
    const MOODS = [
      { emoji: "😊", label: "Happy", color: "#4ade80" },
      { emoji: "😔", label: "Sad", color: "#60a5fa" },
      { emoji: "😤", label: "Angry", color: "#e63946" },
      { emoji: "😌", label: "Calm", color: "#c084fc" },
      { emoji: "🌟", label: "Excited", color: "#f59e0b" },
    ];

    let currentUser = null;
    let entries = [];
    let activeEntryId = null;
    let selectedMood = null;
    let saveTimeout = null;

    // Build mood buttons
    const moodSelect = document.getElementById("moodSelect");
    MOODS.forEach(m => {
      const btn = document.createElement("button");
      btn.className = "mood-btn";
      btn.title = m.label;
      btn.textContent = m.emoji;
      btn.onclick = () => {
        document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedMood = m;
      };
      moodSelect.appendChild(btn);
    });

    // Auth check
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      document.getElementById("sidebarUser").textContent = user.email;
      await loadEntries();
      document.getElementById("loadingOverlay").classList.add("hidden");
    });

    // Load entries from Firestore
    async function loadEntries() {
      try {
        const q = query(
          collection(db, "journals"),
          where("uid", "==", currentUser.uid)
        );
        const snap = await getDocs(q);
        entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        // Sort by updatedAt client-side (no index needed)
        entries.sort((a, b) => {
          const ta = a.updatedAt?.toMillis?.() || 0;
          const tb = b.updatedAt?.toMillis?.() || 0;
          return tb - ta;
        });
        renderEntriesList();
      } catch (err) {
        console.error("Load error:", err);
      }
    }

    // Render sidebar list
    function renderEntriesList() {
      const el = document.getElementById("entriesList");
      if (!entries.length) {
        el.innerHTML = `<div class="entries-empty"><div class="entries-empty-icon">🌙</div><p>No entries yet.<br/>Start writing!</p></div>`;
        return;
      }
      el.innerHTML = "";
      entries.forEach(entry => {
        const mood = MOODS.find(m => m.label === entry.mood);
        const item = document.createElement("div");
        item.className = "entry-item" + (entry.id === activeEntryId ? " active" : "");
        const date = entry.updatedAt?.toDate ? entry.updatedAt.toDate().toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" }) : "Recent";
        item.innerHTML = `
          <div style="display:flex;align-items:center;gap:0.4rem">
            ${mood ? `<span class="mood-dot" style="background:${mood.color}"></span>` : ""}
            <span class="entry-item-title">${entry.title || "Untitled"}</span>
          </div>
          <div class="entry-item-preview">${entry.body ? entry.body.slice(0, 60) + (entry.body.length > 60 ? "…" : "") : "No content"}</div>
          <div class="entry-item-date">${date}</div>
        `;
        item.onclick = () => openEntry(entry);
        el.appendChild(item);
      });
    }

    // Open an entry
    function openEntry(entry) {
      activeEntryId = entry.id;
      document.getElementById("welcomeScreen").style.display = "none";
      document.getElementById("editorArea").classList.add("visible");
      document.getElementById("entryTitle").value = entry.title || "";
      document.getElementById("entryBody").value = entry.body || "";
      updateWordCount();
      setSaveStatus("Saved", "saved");

      // Set mood
      selectedMood = null;
      document.querySelectorAll(".mood-btn").forEach((btn, i) => {
        btn.classList.remove("selected");
        if (MOODS[i].label === entry.mood) {
          btn.classList.add("selected");
          selectedMood = MOODS[i];
        }
      });

      renderEntriesList();
    }

    // New entry
    window.newEntry = function() {
      activeEntryId = null;
      document.getElementById("welcomeScreen").style.display = "none";
      document.getElementById("editorArea").classList.add("visible");
      document.getElementById("entryTitle").value = "";
      document.getElementById("entryBody").value = "";
      document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("selected"));
      selectedMood = null;
      updateWordCount();
      setSaveStatus("Unsaved", "");
      document.getElementById("entryTitle").focus();
      renderEntriesList();
    };

    // Save entry
    window.saveEntry = async function() {
      const title = document.getElementById("entryTitle").value.trim() || "Untitled";
      const body = document.getElementById("entryBody").value.trim();
      if (!body && !title) return;

      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      setSaveStatus("Saving…", "saving");

      const data = {
        uid: currentUser.uid,
        title,
        body,
        mood: selectedMood?.label || null,
        updatedAt: serverTimestamp(),
      };

      try {
        if (activeEntryId) {
          await updateDoc(doc(db, "journals", activeEntryId), data);
        } else {
          data.createdAt = serverTimestamp();
          const ref = await addDoc(collection(db, "journals"), data);
          activeEntryId = ref.id;
        }
        await loadEntries();
        setSaveStatus("Saved ✓", "saved");
      } catch (err) {
        console.error("Save error:", err);
        setSaveStatus("Save failed", "");
      } finally {
        btn.disabled = false;
      }
    };

    // Delete entry
    window.deleteEntry = async function() {
      if (!activeEntryId) { window.newEntry(); return; }
      if (!confirm("Delete this entry? This cannot be undone.")) return;
      try {
        await deleteDoc(doc(db, "journals", activeEntryId));
        activeEntryId = null;
        document.getElementById("editorArea").classList.remove("visible");
        document.getElementById("welcomeScreen").style.display = "flex";
        await loadEntries();
      } catch (err) {
        console.error("Delete error:", err);
      }
    };

    // Word count
    function updateWordCount() {
      const text = document.getElementById("entryBody").value.trim();
      const words = text ? text.split(/\s+/).length : 0;
      document.getElementById("wordCount").textContent = words + (words === 1 ? " word" : " words");
    }

    function setSaveStatus(text, cls) {
      const el = document.getElementById("saveStatus");
      el.textContent = text;
      el.className = "save-status " + cls;
    }

    // Auto-save on typing (after 2s pause)
    document.getElementById("entryBody").addEventListener("input", () => {
      updateWordCount();
      setSaveStatus("Unsaved", "");
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => saveEntry(), 2000);
    });
    document.getElementById("entryTitle").addEventListener("input", () => {
      setSaveStatus("Unsaved", "");
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => saveEntry(), 2000);
    });

    // Keyboard shortcut Ctrl+S
    document.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
        e.preventDefault();
        saveEntry();
      }
    });

  </script>

  <script>
    (function() {
      const saved = localStorage.getItem('iv_theme');
      if (saved === 'light') document.body.classList.add('light');
    })();
    function toggleTheme() {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('iv_theme', isLight ? 'light' : 'dark');
      document.querySelectorAll('.theme-toggle').forEach(btn => {
        btn.textContent = isLight ? '🌙' : '☀️';
      });
    }
    window.addEventListener('DOMContentLoaded', () => {
      const isLight = document.body.classList.contains('light');
      document.querySelectorAll('.theme-toggle').forEach(btn => {
        btn.textContent = isLight ? '🌙' : '☀️';
      });
    });
  </script>

</body>
</html>
